<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sophie的皮克敏王國大冒險</title>
    <style>
        /* 基礎重置與防呆 */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; touch-action: none; overscroll-behavior: none; font-family: 'Courier New', Courier, '微軟正黑體', monospace; }
        
        /* 像素風處理 - 核心 */
        #gameCanvas { 
            display: block; width: 100%; height: 100%; object-fit: contain;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            background-color: #87CEEB; /* 天空藍背景 */
        }

        /* UI 層設定 */
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); z-index: 50;}

        /* 畫面遮罩 */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; pointer-events: auto; text-align: center; padding: 20px; }
        .hidden { display: none !important; }

        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 15px; color: #FFEB3B; text-align: center; text-shadow: 4px 4px 0 #000; }
        p { font-size: clamp(1.2rem, 4vw, 1.8rem); line-height: 1.6; margin-bottom: 20px; font-weight: bold; }
        
        .btn { background: #4CAF50; color: white; border: 4px solid #fff; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; font-weight: bold; box-shadow: 0 8px 0 #2E7D32; font-family: inherit;}
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #2E7D32; }

        /* 劇情對話框 */
        #dialogBox { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: #222; border: 4px solid #fff; padding: 20px; color: #fff; font-size: 1.5rem; font-weight: bold; text-align: left; z-index: 60; display: none; box-shadow: 8px 8px 0 rgba(0,0,0,0.5);}
        #dialogName { color: #FFEB3B; margin-bottom: 10px; font-size: 1.2rem; border-bottom: 2px dashed #fff; padding-bottom: 5px; display: inline-block;}
        #dialogHint { font-size: 1rem; color: #aaa; text-align: right; margin-top: 10px; animation: blink 1s infinite;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 系統錯誤雜訊特效 */
        #glitchOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 90; opacity: 0; }
        .glitching { animation: glitchAnim 0.2s infinite; opacity: 1 !important; background-color: rgba(255,0,0,0.2) !important;}
        @keyframes glitchAnim { 0% { transform: translate(5px, 5px); } 20% { transform: translate(-5px, -5px); filter: invert(1); } 40% { transform: translate(-5px, 5px); } 60% { transform: translate(5px, -5px); filter: hue-rotate(90deg); } 80% { transform: translate(5px, 5px); } 100% { transform: translate(0, 0); } }

        /* Boss 血條 */
        #bossHealthContainer { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; height: 50px; background: #222; border: 4px solid #FFF; z-index: 40; display: flex; align-items: center; justify-content: center;}
        #bossHealthBar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ff0000; z-index: 1; transition: width 0.1s;}
        #bossName { position: relative; z-index: 2; width: 100%; text-align: center; color: white; font-weight: 900; font-size: 24px; text-shadow: 2px 2px 0 #000;}

        /* 手機按鈕 */
        #mobileControls { position: absolute; bottom: 20px; left: 0; width: 100%; height: 100px; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: auto; z-index: 80; }
        @media (min-width: 768px) { #mobileControls { display: none; } }
        .control-group { display: flex; gap: 15px; }
        .action-btn { width: 75px; height: 75px; background: rgba(0, 0, 0, 0.5); border: 4px solid #fff; font-size: 28px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
        .action-btn:active { background: rgba(255, 255, 255, 0.5); color: #000; }
        .btn-attack { background: rgba(255, 87, 34, 0.8); }

    </style>
</head>
<body>

    <div id="glitchOverlay"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <div id="bossHealthContainer" class="hidden">
            <div id="bossHealthBar"></div>
            <div id="bossName">皮友 Ben 大臉明信片</div>
        </div>

        <div id="dialogBox">
            <div id="dialogName">Name</div>
            <div id="dialogText">Text</div>
            <div id="dialogHint">▶ 點擊或按空白鍵繼續</div>
        </div>

        <div id="mobileControls" class="hidden">
            <div class="control-group">
                <div class="action-btn" id="btnLeft">◀</div>
                <div class="action-btn" id="btnRight">▶</div>
            </div>
            <div class="control-group">
                <div class="action-btn" id="btnJump">跳</div>
                <div class="action-btn btn-attack" id="btnAttack">打</div>
            </div>
        </div>
    </div>

    <div id="startScreen" class="screen">
        <h1>Sophie的皮克敏<br>王國大冒險</h1>
        <p>今天是妳的生日！🎂<br>準備好專屬技能開路了嗎？</p>
        <button class="btn" id="startBtn">▶ 開始遊戲</button>
    </div>

    <div id="endScreen" class="screen hidden">
        <h1 style="font-size: 3.5rem; margin-bottom: 0px; text-shadow: 4px 4px 0 #E91E63;">🎉 通關成功！ 🎉</h1>
        <div style="font-size: 8rem; margin: 30px 0; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.8));">🎂</div>
        <h2 style="color: #FFF; line-height: 1.6; font-size: 2.2rem; background: #222; padding: 25px 40px; border: 4px solid #FFD700;">
            ✨ 祝賀雙子座 Gemini 的 Sophie ✨<br>
            <span style="color: #FFEB3B; font-size: 3.5rem; font-weight: bold;">生日快樂！</span><br>
            <div style="font-size: 1.3rem; color: #FFF; text-align: right; margin-top: 15px; border-top: 2px dashed #FFF; padding-top: 10px;">Ching Ying Lin 敬賀 🧚‍♀️</div>
        </h2>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const mobileControls = document.getElementById('mobileControls');
    const bossHealthContainer = document.getElementById('bossHealthContainer');
    const bossHealthBar = document.getElementById('bossHealthBar');
    const dialogBox = document.getElementById('dialogBox');
    const dialogName = document.getElementById('dialogName');
    const dialogText = document.getElementById('dialogText');
    const glitchOverlay = document.getElementById('glitchOverlay');

    // 視窗自適應
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();

    // --- 圖片路徑優化：直接讀取根目錄同層級檔案 ---
    const imageAssets = {
        'tech_power': { src: './tech_power.png', emoji: '👩‍💻' },
        'sophie': { src: './sophie.png', emoji: '👧' },
        'pink_sophie': { src: './pink_sophie.png', emoji: '🏃‍♀️' },
        'mushroom': { src: './mushroom.png', emoji: '📢' },
        'ruth': { src: './ruth.png', emoji: '🧢' },
        'party_walk': { src: './party_walk.png', emoji: '✨' },
        '5_tickets': { src: './5_tickets.png', emoji: '🎫' },
        'double': { src: './double.png', emoji: '🌸' },
        'dog': { src: './dog.png', emoji: '🐕' },
        'big_ben': { src: './big_ben.png', emoji: '🧔🏻‍♂️' },
        'roll_eyes': { src: './roll_eyes.png', emoji: '🙄' }
    };

    const loadedImages = {};
    
    // 預先載入所有圖片
    for (let key in imageAssets) {
        let img = new Image();
        img.src = imageAssets[key].src;
        img.onload = () => { loadedImages[key] = img; };
        img.onerror = () => { console.warn(`找不到圖片: ${imageAssets[key].src}，將使用 Emoji 替代。`); };
    }

    // 安全繪圖函數 (防破圖防呆)
    function drawImageSafely(key, x, y, w, h) {
        let img = loadedImages[key];
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, x, y, w, h);
        } else {
            // 如果圖片還沒讀好或不存在，使用高質感 Emoji 佔位，絕不讓遊戲崩潰
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(x, y, w, h);
            ctx.lineWidth = 4; ctx.strokeStyle = '#333'; ctx.strokeRect(x, y, w, h);
            ctx.font = (h * 0.6) + 'px Courier New';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#000';
            ctx.fillText(imageAssets[key].emoji, x + w/2, y + h/2);
        }
    }

    // --- 音效系統 (合成 8-bit) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playTone(freq, type, duration, vol, startTime) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, startTime || audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, startTime || audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, (startTime || audioCtx.currentTime) + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime || audioCtx.currentTime); 
        osc.stop((startTime || audioCtx.currentTime) + duration);
    }
    
    const sfx = {
        jump: () => playTone(300, 'square', 0.2, 0.05),
        hit: () => { playTone(150, 'sawtooth', 0.1, 0.1); playTone(100, 'square', 0.1, 0.1); },
        break: () => { playTone(80, 'sawtooth', 0.3, 0.15); playTone(50, 'square', 0.4, 0.15); },
        powerup: () => { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.1, 0.1), i*100)); },
        error: () => { playTone(100, 'sawtooth', 0.5, 0.2); playTone(120, 'square', 0.5, 0.2); },
        win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playTone(f, 'square', 0.2, 0.1), i*150)); }
    };

    // --- 遊戲狀態與變數 ---
    let gameState = 'START'; // START, INTRO_1, INTRO_2, PLAYING, BOSS_FIGHT, WIN
    let introTimer = 0;
    let cameraX = 0;
    let groundY = 0;
    let screenShake = 0;
    
    const keys = { left: false, right: false, jump: false, attack: false };

    const player = {
        x: 100, y: 0, width: 100, height: 100, vx: 0, vy: 0, speed: 6, jumpPower: -18, gravity: 0.9,
        isGrounded: true, isAttacking: false, attackTimer: 0,
        sprite: 'pink_sophie', attackRange: 80, damage: 1
    };

    let entities = [];
    let popups = [];
    let boss = { hp: 10, maxHp: 10, active: false };

    // --- 關卡設計 (Trigger 點) ---
    function initGame() {
        groundY = canvas.height - 150;
        player.x = 200; player.y = groundY - player.height;
        player.sprite = 'pink_sophie';
        player.speed = 8; player.damage = 1;
        cameraX = 0; 

        entities = [
            { type: 'mushroom_enemy', x: 800, y: groundY - 80, w: 80, h: 80, hp: 1, active: true },
            { type: 'mushroom_enemy', x: 1200, y: groundY - 80, w: 80, h: 80, hp: 1, active: true },
            { type: 'trigger_megaphone', x: 1600, done: false },
            { type: 'mushroom_enemy', x: 2000, y: groundY - 120, w: 120, h: 120, hp: 2, active: true },
            { type: 'trigger_ruth', x: 2600, w: 100, h: 100, y: groundY - 100, active: true }, // Ruth NPC
            { type: 'trigger_error', x: 3800, done: false },
            { type: 'trigger_dog', x: 4200, done: false },
            { type: 'trigger_boss', x: 5000, done: false }
        ];

        popups = [];
        
        startScreen.classList.add('hidden');
        mobileControls.classList.remove('hidden');
        if(audioCtx.state === 'suspended') audioCtx.resume();
        
        // 進入開場動畫
        gameState = 'INTRO_1';
        introTimer = 120; // 2秒鐘
        requestAnimationFrame(gameLoop);
    }

    // --- 輸入控制 ---
    function handleInputDown(act) {
        if (gameState === 'INTRO_2' && act === 'jump') advanceIntro();
        if (gameState === 'DIALOG' && act === 'jump') closeDialog();
        if (gameState !== 'PLAYING' && gameState !== 'BOSS_FIGHT') return;

        if (act === 'left') keys.left = true;
        if (act === 'right') keys.right = true;
        if (act === 'jump' && player.isGrounded) { player.vy = player.jumpPower; player.isGrounded = false; sfx.jump(); }
        if (act === 'attack') performAttack();
    }
    
    function handleInputUp(act) {
        if (act === 'left') keys.left = false;
        if (act === 'right') keys.right = false;
    }

    window.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') handleInputDown('left');
        if(e.code === 'ArrowRight' || e.code === 'KeyD') handleInputDown('right');
        if(e.code === 'Space' || e.code === 'ArrowUp') handleInputDown('jump');
        if(e.code === 'Enter' || e.code === 'KeyZ') handleInputDown('attack');
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') handleInputUp('left');
        if(e.code === 'ArrowRight' || e.code === 'KeyD') handleInputUp('right');
    });

    // 手機觸控
    ['Left', 'Right', 'Jump', 'Attack'].forEach(btn => {
        const el = document.getElementById('btn' + btn);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputDown(btn.toLowerCase()); }, {passive: false});
        el.addEventListener('touchend', (e) => { e.preventDefault(); handleInputUp(btn.toLowerCase()); }, {passive: false});
    });

    document.getElementById('startBtn').addEventListener('click', initGame);

    function performAttack() {
        player.isAttacking = true;
        player.attackTimer = 15; 
        let hitBox = { x: player.x + (keys.left ? -player.attackRange : player.width), y: player.y, w: player.attackRange, h: player.height };

        if (gameState === 'PLAYING') {
            entities.forEach(ent => {
                if (ent.type === 'mushroom_enemy' && ent.active && checkCollision(hitBox, ent)) {
                    ent.hp -= player.damage;
                    sfx.hit();
                    if (ent.hp <= 0) {
                        ent.active = false; sfx.break(); screenShake = 5;
                    }
                }
            });
        } 
        else if (gameState === 'BOSS_FIGHT') {
            if (boss.active && player.sprite === 'dog') { // 騎著歐慶才能打
                boss.hp -= 1;
                sfx.hit();
                screenShake = 15;
                bossHealthBar.style.width = (boss.hp / boss.maxHp * 100) + '%';
                
                if (boss.hp <= 0) {
                    sfx.break();
                    boss.active = false;
                    bossHealthContainer.classList.add('hidden');
                    screenShake = 30;
                    setTimeout(winGame, 1500);
                }
            }
        }
    }

    // --- 劇情與過場邏輯 ---
    function advanceIntro() {
        gameState = 'PLAYING';
        dialogBox.style.display = 'none';
        sfx.powerup();
    }

    function triggerEvent(ent) {
        if (ent.type === 'trigger_megaphone') {
            sfx.powerup();
            showPopup('mushroom', canvas.width/2 - 75, canvas.height/3, 150, 150, "皮友幫打菇+3 !!", '#FFEB3B', 120);
            player.damage = 3; player.attackRange = 120;
        }
        else if (ent.type === 'trigger_ruth') {
            sfx.powerup();
            player.sprite = 'party_walk'; 
            showPopup('party_walk', canvas.width/2 - 100, canvas.height/4, 200, 100, "GEG祖媽 Party Walk 啟動!", '#FF00FF', 150);
            player.speed = 12; // 加速
            ent.active = false;
        }
        else if (ent.type === 'trigger_error') {
            gameState = 'DIALOG'; keys.left = false; keys.right = false;
            sfx.error();
            glitchOverlay.classList.add('glitching');
            screenShake = 20;
            
            setTimeout(() => {
                glitchOverlay.classList.remove('glitching');
                showDialog('仙子 CY Lin', '哎呀系統出錯！送妳 5 張打菇券和種花 Double！\n(準備迎接神獸降臨)');
                showPopup('5_tickets', canvas.width/2 - 150, canvas.height/2, 100, 100, "", "", 180);
                showPopup('double', canvas.width/2 + 50, canvas.height/2, 100, 100, "", "", 180);
                sfx.powerup();
            }, 1000);
        }
        else if (ent.type === 'trigger_dog') {
            sfx.powerup();
            player.sprite = 'dog';
            player.width = 150; player.height = 150; player.y = groundY - 150;
            showPopup('dog', canvas.width/2 - 100, canvas.height/4, 200, 200, "神獸歐慶登場！戰力 +5000 !!", '#FF0000', 120);
        }
        else if (ent.type === 'trigger_boss') {
            gameState = 'BOSS_FIGHT'; keys.left = false; keys.right = false;
            boss.active = true;
            bossHealthContainer.classList.remove('hidden');
            bossHealthBar.style.width = '100%';
            sfx.error(); screenShake = 20;
            
            // 翻白眼 2 秒
            let oldSprite = player.sprite;
            player.sprite = 'roll_eyes';
            setTimeout(() => { player.sprite = oldSprite; }, 2000);
        }
        ent.done = true;
    }

    function showDialog(name, text) { dialogName.innerText = name; dialogText.innerText = text; dialogBox.style.display = 'block'; }
    function closeDialog() { dialogBox.style.display = 'none'; gameState = 'PLAYING'; }
    function showPopup(key, x, y, w, h, text, color, duration) { popups.push({ key, x, y, w, h, text, color, life: duration }); }
    function checkCollision(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }

    function winGame() {
        gameState = 'WIN';
        sfx.win();
        endScreen.classList.remove('hidden');
        mobileControls.classList.add('hidden');
    }

    // --- 主迴圈邏輯 ---
    function update() {
        if (screenShake > 0) screenShake--;

        if (gameState === 'INTRO_1') {
            introTimer--;
            if (introTimer <= 0) {
                gameState = 'INTRO_2';
                sfx.powerup(); screenShake = 30;
                showDialog('系統提示', '今天是妳的生日！但通往生日派對的道路被障礙物擋住了，快用專屬技能開路吧！');
            }
        }
        
        popups.forEach((p, i) => { p.life--; p.y -= 0.5; if(p.life <= 0) popups.splice(i, 1); });

        if (gameState === 'PLAYING' || gameState === 'BOSS_FIGHT') {
            if (keys.right) player.vx = player.speed;
            else if (keys.left) player.vx = -player.speed;
            else player.vx = 0;

            let nextX = player.x + player.vx;
            let blocked = false;
            let pBox = { x: nextX + 20, y: player.y + 20, w: player.width - 40, h: player.height - 20 };

            // 撞擊蘑菇判定
            if (gameState === 'PLAYING') {
                entities.forEach(ent => {
                    if (ent.type === 'mushroom_enemy' && ent.active && checkCollision(pBox, ent)) {
                        if (player.sprite === 'party_walk' || player.sprite === 'dog') {
                            ent.active = false; sfx.break(); screenShake = 5; // 無敵撞飛
                        } else {
                            blocked = true; // 擋住
                        }
                    }
                });
            }

            if (!blocked) player.x = nextX;
            if (player.x > cameraX + canvas.width * 0.4) cameraX = player.x - canvas.width * 0.4;
            if (player.x < cameraX) player.x = cameraX; // 不准後退超過鏡頭

            player.vy += player.gravity; player.y += player.vy;
            if (player.y + player.height > groundY) { player.y = groundY - player.height; player.vy = 0; player.isGrounded = true; }
            if (player.attackTimer > 0) player.attackTimer--; else player.isAttacking = false;

            // 檢查事件觸發
            if (gameState === 'PLAYING') {
                entities.forEach(ent => {
                    if (ent.type.startsWith('trigger') && !ent.done && player.x > ent.x) triggerEvent(ent);
                });
            }
        }
    }

    // --- 繪製畫面 ---
    function draw() {
        // 背景 (Pixelated)
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        if (screenShake > 0) ctx.translate((Math.random()*screenShake - screenShake/2), (Math.random()*screenShake - screenShake/2));

        if (gameState === 'INTRO_1') {
            drawImageSafely('tech_power', canvas.width/2 - 100, canvas.height/2 - 100, 200, 200);
            ctx.restore(); return;
        }
        
        if (gameState === 'INTRO_2') {
            // 彩光特效
            ctx.fillStyle = `hsl(${Date.now() % 360}, 100%, 50%)`; ctx.globalAlpha = 0.3;
            ctx.fillRect(0,0,canvas.width, canvas.height); ctx.globalAlpha = 1.0;
            drawImageSafely('sophie', canvas.width/2 - 100, canvas.height/2 - 100, 200, 200);
            ctx.restore(); return;
        }

        // 遊戲場景捲動
        ctx.translate(-cameraX, 0);

        // 地板
        ctx.fillStyle = '#8B4513'; ctx.fillRect(cameraX-100, groundY, canvas.width + 200, canvas.height - groundY);
        ctx.fillStyle = '#4CAF50'; ctx.fillRect(cameraX-100, groundY, canvas.width + 200, 20);
        ctx.fillStyle = '#FFF'; ctx.font = '40px Courier New';
        ctx.fillText('☁️', cameraX*0.9 + 100, 150); ctx.fillText('☁️', cameraX*0.9 + 500, 100);

        // 畫實體
        entities.forEach(ent => {
            if (ent.active) {
                if (ent.type === 'mushroom_enemy') {
                    ctx.font = ent.w * 0.8 + 'px Courier New'; ctx.fillText('🍄', ent.x, ent.y + ent.h*0.8);
                } else if (ent.type === 'trigger_ruth') {
                    drawImageSafely('ruth', ent.x, ent.y, ent.w, ent.h);
                }
            }
        });

        // 畫 Boss
        if (boss.active) {
            let bx = 5200; let by = groundY - 400; let bw = 400; let bh = 400;
            drawImageSafely('big_ben', bx, by, bw, bh);
            ctx.fillStyle = '#E91E63'; ctx.font = 'bold 40px Courier New'; ctx.textAlign='center';
            ctx.fillText('NOT THIS WAY', bx + bw/2, by + bh - 20);
        }

        // 畫玩家
        let pFlip = keys.left && !keys.right;
        ctx.save();
        if (pFlip) { ctx.translate(player.x + player.width, player.y); ctx.scale(-1, 1); } 
        else { ctx.translate(player.x, player.y); }
        
        let bob = (!player.isGrounded) ? 0 : Math.sin(Date.now() / 100) * 5;
        drawImageSafely(player.sprite, 0, bob, player.width, player.height);
        
        if (player.isAttacking) {
            ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font='40px Arial';
            ctx.fillText('💨', player.width, 50);
        }
        ctx.restore();

        ctx.restore(); // 恢復相機

        // 畫 UI Popups (不隨相機移動，固定在螢幕上)
        popups.forEach(p => {
            ctx.globalAlpha = p.life / 60 > 1 ? 1 : p.life / 60;
            drawImageSafely(p.key, p.x, p.y, p.w, p.h);
            if (p.text) {
                ctx.fillStyle = '#000'; ctx.font = 'bold 28px "微軟正黑體"'; ctx.textAlign='center';
                ctx.fillText(p.text, p.x + p.w/2 + 2, p.y - 18);
                ctx.fillStyle = p.color; ctx.fillText(p.text, p.x + p.w/2, p.y - 20);
            }
            ctx.globalAlpha = 1.0;
        });
    }

    function gameLoop() {
        update(); draw();
        if (gameState !== 'WIN') requestAnimationFrame(gameLoop);
    }
    
    // 初始化繪製
    draw();

</script>
</body>
</html>
