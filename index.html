<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sophie的皮克敏王國大冒險</title>
    <style>
        /* 基礎重置 */
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        
        /* 移除 body 的 touch-action: none 以利特定視窗(結局)可以滑動 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #87CEEB; overflow: hidden; overscroll-behavior: none; font-family: '微軟正黑體', 'Arial', sans-serif; }
        
        /* 將禁止滑動限制在遊戲畫布與 UI 操控層 */
        #gameCanvas { display: block; width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; image-rendering: -moz-crisp-edges; touch-action: none; }
        #uiLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left); z-index: 50; touch-action: none; }

        /* 畫面層 (支援超過螢幕高度時的滾動) */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; pointer-events: auto; text-align: center; padding: 20px; backdrop-filter: blur(5px); overflow-y: auto; -webkit-overflow-scrolling: touch; touch-action: auto; }
        
        #startScreen { background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.95) 100%); }
        #endScreen { background: rgba(0, 0, 0, 0.85); }
        .hidden { display: none !important; }

        h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin-bottom: 10px; color: #FFEB3B; text-align: center; text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 8px 8px 0 rgba(0,0,0,0.8); animation: pulseTitle 1.5s infinite ease-in-out; }
        @keyframes pulseTitle { 0% { transform: scale(1) translateY(0); } 50% { transform: scale(1.05) translateY(-10px); text-shadow: -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000, 15px 15px 0 rgba(0,0,0,0.6); } 100% { transform: scale(1) translateY(0); } }

        /* 遊戲按鍵說明 */
        .instructions { font-size: clamp(1rem, 3.5vw, 1.3rem); color: #333; background: rgba(255, 255, 255, 0.95); padding: 12px 25px; border-radius: 30px; border: 4px solid #4CAF50; box-shadow: 0 6px 10px rgba(0,0,0,0.4); margin: 20px 0; animation: floatUp 2s infinite ease-in-out; font-weight: bold;}
        @keyframes floatUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .btn { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; border: 4px solid #fff; padding: 15px 50px; font-size: 1.8rem; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 20px rgba(0,0,0,0.6); transition: transform 0.1s, filter 0.2s; z-index: 10;}
        .btn:active { transform: scale(0.95); filter: brightness(0.8); }

        /* 結局畫面重構 (支援手機版自適應) */
        .end-title { font-size: 3.5rem; margin-bottom: 0px; text-shadow: 3px 3px 0 #E91E63; }
        .cake-container { position: relative; margin: 30px 0; animation: floatUp 2s infinite; }
        .cake-emoji { font-size: 8rem; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); }
        .cake-tag { position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 1.6rem; white-space: nowrap; font-weight: 900; color: #FFEB3B; text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 4px 4px 8px rgba(0,0,0,0.8); background: rgba(233, 30, 99, 0.8); padding: 5px 20px; border-radius: 20px; border: 3px solid #FFF; }
        .message-box { color: #FFF; line-height: 1.6; font-size: 2.2rem; background: rgba(0,0,0,0.7); padding: 25px 40px; border-radius: 25px; border: 5px solid #FFD700; box-shadow: 0 0 30px #FFD700, inset 0 0 20px #FFD700; }
        .happy-birthday { color: #FFEB3B; font-size: 3.5rem; font-weight: 900; text-shadow: 4px 4px 0 #E91E63; }
        .signature { font-size: 1.3rem; color: #FFF; text-align: right; margin-top: 15px; border-top: 2px dashed #FFF; padding-top: 10px; }

        #dialogBox { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; background: rgba(255, 255, 255, 0.95); border: 5px solid #333; border-radius: 20px; padding: 20px; color: #333; font-size: 1.5rem; font-weight: bold; text-align: left; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 60; display: none; }
        #dialogName { color: #E91E63; margin-bottom: 10px; font-size: 1.2rem; }

        #glitchOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); pointer-events: none; z-index: 90; opacity: 0; }
        .glitching { animation: glitchAnim 0.2s infinite; opacity: 1 !important; background-color: rgba(255,0,0,0.2) !important;}
        @keyframes glitchAnim { 0% { transform: translate(5px, 5px); } 20% { transform: translate(-5px, -5px); filter: invert(1); } 40% { transform: translate(-5px, 5px); } 60% { transform: translate(5px, -5px); filter: hue-rotate(90deg); } 80% { transform: translate(5px, 5px); } 100% { transform: translate(0, 0); } }

        .mobile-inst { display: none; }
        
        /* --- 手機版自適應與介面優化 --- */
        @media (max-width: 768px), (max-height: 850px) {
            .desktop-inst { display: none; } 
            .mobile-inst { display: block; }
            #mobileControls { display: flex; }
            
            /* 讓結局畫面在手機上可以滾動並調整字體大小 */
            .screen { justify-content: flex-start; padding-top: 40px; padding-bottom: 60px; }
            .end-title { font-size: 2.2rem; }
            .cake-container { margin: 20px 0; }
            .cake-emoji { font-size: 6rem; }
            .cake-tag { font-size: 1.2rem; top: -20px; padding: 4px 15px;}
            .message-box { font-size: 1.3rem; padding: 15px 20px; }
            .happy-birthday { font-size: 2.2rem; }
            .signature { font-size: 1.1rem; margin-top: 10px; padding-top: 8px;}
            .btn { padding: 12px 30px; font-size: 1.5rem; }
        }

        #mobileControls { position: absolute; bottom: max(20px, env(safe-area-inset-bottom)); left: 0; width: 100%; height: 100px; justify-content: space-between; padding: 0 20px; pointer-events: auto; z-index: 80; }
        @media (min-width: 769px) { #mobileControls { display: none !important; } }
        
        .control-group { display: flex; gap: 15px; }
        .action-btn { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.7); border: 3px solid rgba(0, 0, 0, 0.2); border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; box-shadow: 0 5px 0 rgba(0,0,0,0.2); -webkit-tap-highlight-color: transparent; }
        .action-btn:active { transform: translateY(5px); box-shadow: 0 0 0 rgba(0,0,0,0.2); background: rgba(255, 255, 255, 0.9); }
        .btn-attack { background: rgba(255, 87, 34, 0.8); color: white; border-color: #D84315; }
        .btn-attack:active { background: #FF5722; }

        #bossHealthContainer { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 600px; height: 50px; background: #222; border: 5px solid #FFF; border-radius: 25px; z-index: 40; box-shadow: 0 8px 20px rgba(0,0,0,0.6); overflow: hidden; display: flex; align-items: center; justify-content: center;}
        #bossHealthBar { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #ff5722); transition: width 0.1s; z-index: 1;}
        #bossName { position: relative; z-index: 2; width: 100%; text-align: center; color: white; font-weight: 900; top: 2px; font-size: 24px; letter-spacing: 2px; text-shadow: 2px 2px 4px #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;}
        
        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none;}
    </style>
</head>
<body>

    <div id="glitchOverlay"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        <div id="bossHealthContainer" class="hidden">
            <div id="bossHealthBar"></div>
            <div id="bossName">皮友 Ben 的大臉明信片</div>
        </div>

        <div id="dialogBox">
            <div id="dialogName">Name</div>
            <div id="dialogText">Text</div>
        </div>

        <div id="mobileControls" class="hidden">
            <div class="control-group">
                <div class="action-btn" id="btnLeft">◀</div>
                <div class="action-btn" id="btnRight">▶</div>
            </div>
            <div class="control-group">
                <div class="action-btn" id="btnJump">跳</div>
                <div class="action-btn btn-attack" id="btnAttack">打</div>
            </div>
        </div>
    </div>

    <!-- 開始畫面 -->
    <div id="startScreen" class="screen">
        <canvas id="bgCanvas"></canvas>
        <h1 style="position: relative; z-index: 10;">Sophie的皮克敏<br>王國大冒險</h1>
        <p style="color: #FFF; position: relative; z-index: 10;">今天是妳的生日！🎂<br>準備好專屬技能開路了嗎？</p>
        
        <div class="instructions desktop-inst" style="position: relative; z-index: 10;">
            ⌨️ 遊戲操作：<br>
            [方向鍵] 移動 / [空白鍵] 跳躍 / [Z鍵 或 Enter] 攻擊
        </div>
        <div class="instructions mobile-inst" style="position: relative; z-index: 10;">
            📱 遊戲操作：<br>
            請使用畫面下方的虛擬按鍵移動與攻擊！
        </div>

        <button class="btn" id="startBtn">▶ 開始冒險</button>
    </div>

    <!-- 結局畫面 (已修復滾動) -->
    <div id="endScreen" class="screen hidden">
        <h1 class="end-title">🎉 通關成功！ 🎉</h1>
        
        <div class="cake-container">
            <div class="cake-emoji">🎂</div>
            <div class="cake-tag">獻上特製皮克敏蛋糕！</div>
        </div>

        <h2 class="message-box">
            ✨ 祝賀雙子座 Gemini 的 Sophie ✨<br>
            <span class="happy-birthday">生日快樂！</span><br>
            <div class="signature">Ching Ying Lin 敬賀 🧚‍♀️</div>
        </h2>
        
        <button class="btn" id="restartBtn" style="margin-top: 25px; background: #E91E63; position: relative; z-index: 10;">再來一次</button>
    </div>

<script>
    const imgUrls = {
        'tech_power': './tech_power.png',
        'sophie': './sophie.png',
        'pink_sophie': './pink_sophie.png',
        'megaphone': './mushroom.png',  
        'mushroom_enemy': '',           
        'ruth': './ruth.png',
        'party_walk': './party_walk.png',
        '5_tickets': './5_tickets.png',
        'double': './double.png',
        'dog': './dog.png',
        'big_ben': './big_ben.png',
        'roll_eyes': './roll_eyes.png'
    };

    const imgs = {};
    for (let key in imgUrls) {
        if (imgUrls[key] !== '') {
            imgs[key] = new Image();
            imgs[key].src = imgUrls[key];
        }
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const endScreen = document.getElementById('endScreen');
    const mobileControls = document.getElementById('mobileControls');
    const bossHealthContainer = document.getElementById('bossHealthContainer');
    const bossHealthBar = document.getElementById('bossHealthBar');
    const dialogBox = document.getElementById('dialogBox');
    const dialogName = document.getElementById('dialogName');
    const dialogText = document.getElementById('dialogText');
    const glitchOverlay = document.getElementById('glitchOverlay');

    let groundY = 0;

    // --- 核心更新：畫布邏輯縮放系統 ---
    function resize() { 
        if (window.innerWidth < 800) {
            // 手機版：創造一個虛擬的 1000px 寬畫布，強制縮放使大物件(Boss)完整可見
            canvas.width = 1000;
            canvas.height = window.innerHeight * (1000 / window.innerWidth);
        } else {
            // 電腦版：維持 1:1 像素映射不變
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        groundY = canvas.height - 150;
        
        // 即時更新物件防錯
        if (typeof player !== 'undefined' && player.isGrounded) player.y = groundY - player.height;
        if (typeof boss !== 'undefined' && boss.active) {
            boss.targetY = groundY - 450;
            if (boss.state === 'active') boss.y = boss.targetY;
        }
    }
    window.addEventListener('resize', resize); resize();

    function drawSprite(key, x, y, w, h, flip = false, fallbackEmoji = '👩🏻‍💻') {
        const img = imgs[key];
        ctx.save();
        if (flip) {
            ctx.translate(x + w, y);
            ctx.scale(-1, 1);
            x = 0; 
        }
        
        if (img && img.complete && img.naturalWidth > 0) {
            ctx.drawImage(img, x, y, w, h);
        } else {
            let walkBob = (!flip) ? Math.sin(Date.now() / 100) * 5 : 0;
            ctx.font = h * 0.8 + 'px Arial';
            ctx.fillText(fallbackEmoji, x + w*0.1, y + h*0.8 + walkBob);
        }
        ctx.restore();
    }

    // --- 音效與 BGM 系統 ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let currentBGM = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type, duration, vol, startTime) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, startTime || audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, startTime || audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, (startTime || audioCtx.currentTime) + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime || audioCtx.currentTime); 
        osc.stop((startTime || audioCtx.currentTime) + duration);
    }
    
    function playBGM(type) {
        if(!audioCtx) return;
        if(currentBGM) clearInterval(currentBGM);
        
        let notes = [];
        let speed = 250;
        
        if (type === 'normal') {
            notes = [261, 329, 392, 261, 329, 392, 440, 392];
            speed = 300;
        } else if (type === 'party') {
            notes = [523, 523, 659, 784, 523, 523, 659, 784, 880, 784];
            speed = 150; 
        } else if (type === 'boss') {
            notes = [130, 146, 130, 146, 164, 146, 130, 100];
            speed = 200; 
        } else if (type === 'stop') {
            return;
        }

        let step = 0;
        currentBGM = setInterval(() => {
            playTone(notes[step % notes.length], (type==='boss'?'sawtooth':'square'), speed/1000, 0.05);
            step++;
        }, speed);
    }

    const sfx = {
        jump: () => playTone(300, 'square', 0.2, 0.05),
        hit: () => { playTone(150, 'sawtooth', 0.1, 0.1); playTone(100, 'square', 0.1, 0.1); },
        break: () => { playTone(80, 'sawtooth', 0.3, 0.15); playTone(50, 'square', 0.4, 0.15); },
        powerup: () => { [400, 500, 600, 800].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.1, 0.1), i*100)); },
        error: () => { playTone(100, 'sawtooth', 0.5, 0.2); playTone(120, 'square', 0.5, 0.2); },
        win: () => { 
            playBGM('stop');
            const t0 = audioCtx.currentTime + 0.1;
            const tempo = 0.3; 
            const notes = [
                {f:392, d:0.5, w:0}, {f:392, d:0.5, w:0.5}, {f:440, d:1.0, w:1}, {f:392, d:1.0, w:2}, {f:523, d:1.0, w:3}, {f:494, d:2.0, w:4},
                {f:392, d:0.5, w:6}, {f:392, d:0.5, w:6.5}, {f:440, d:1.0, w:7}, {f:392, d:1.0, w:8}, {f:587, d:1.0, w:9}, {f:523, d:2.0, w:10},
                {f:392, d:0.5, w:12}, {f:392, d:0.5, w:12.5}, {f:784, d:1.0, w:13}, {f:659, d:1.0, w:14}, {f:523, d:1.0, w:15}, {f:494, d:1.0, w:16}, {f:440, d:1.5, w:17},
                {f:698, d:0.5, w:19}, {f:698, d:0.5, w:19.5}, {f:659, d:1.0, w:20}, {f:523, d:1.0, w:21}, {f:587, d:1.0, w:22}, {f:523, d:2.5, w:23}
            ];
            notes.forEach(n => playTone(n.f, 'square', n.d * tempo, 0.15, t0 + n.w * tempo));
        }
    };

    let gameState = 'START'; 
    let cameraX = 0;
    let screenShake = 0;
    let showMegaphoneEffect = false; 

    const keys = { left: false, right: false, jump: false, attack: false };

    const player = {
        x: 100, y: 0, width: 120, height: 120, vx: 0, vy: 0, speed: 7, jumpPower: -18, gravity: 0.9,
        isGrounded: true, isAttacking: false, attackTimer: 0,
        emoji: '👩🏻‍💻', hasPartyWalk: false, hasPikmorphie: false, attackRange: 80, damage: 1, currentKey: 'pink_sophie'
    };

    let mushrooms = [], particles = [], floatingTexts = [], npcs = [], eventTriggers = [], boss = { active: false };

    function initGame() {
        initAudio(); 
        playBGM('normal'); 

        player.x = 200; player.y = groundY - player.height;
        player.vx = 0; player.vy = 0;
        player.hasPartyWalk = false; player.hasPikmorphie = false;
        player.speed = 7; player.attackRange = 80; player.damage = 1;
        player.width = 120; player.height = 120;
        player.currentKey = 'pink_sophie';
        cameraX = 0; screenShake = 0;
        showMegaphoneEffect = false;

        mushrooms = [
            { x: 800, y: groundY - 80, w: 80, h: 80, hp: 1, active: true, size: 80, hitTimer: 0 },
            { x: 1200, y: groundY - 80, w: 80, h: 80, hp: 1, active: true, size: 80, hitTimer: 0 },
            { x: 1700, y: groundY - 180, w: 180, h: 180, hp: 3, active: true, size: 180, hitTimer: 0 },
            { x: 2000, y: groundY - 80, w: 80, h: 80, hp: 1, active: true, size: 80, hitTimer: 0 }
        ];

        npcs = [
            { id: 'ruth', x: 2500, y: groundY - 150, w: 150, h: 150, emoji: '🧢👍', name: 'GEG祖媽 Ruth', active: true, key: 'ruth' },
            { id: 'cylin', x: 4200, y: -200, targetY: groundY - 150, w: 150, h: 150, emoji: '🧚‍♀️✨', name: '仙子 CY Lin', active: false, key: 'double' } 
        ];

        boss = { x: 5500, y: -500, targetY: groundY - 450, width: 450, height: 450, maxHp: 30, hp: 30, active: false, hitTimer: 0, state: 'waiting' };

        eventTriggers = [
            { x: 1400, id: 'trigger_megaphone', done: false },
            { x: 2400, id: 'trigger_ruth', done: false },
            { x: 4000, id: 'trigger_error', done: false },
            { x: 5200, id: 'trigger_boss', done: false }
        ];

        particles = []; floatingTexts = [];
        gameState = 'PLAYING';
        startScreen.classList.add('hidden');
        endScreen.classList.add('hidden');
        bossHealthContainer.classList.add('hidden');
        dialogBox.style.display = 'none';
        
        requestAnimationFrame(gameLoop);
    }

    document.getElementById('startBtn').addEventListener('click', initGame);
    document.getElementById('restartBtn').addEventListener('click', () => location.reload());

    window.addEventListener('keydown', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        if(e.code === 'Space' || e.code === 'ArrowUp') jump();
        if(e.code === 'Enter' || e.code === 'KeyZ') attack();
        if(gameState.startsWith('EVENT') && (e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyZ')) advanceEvent();
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if(e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
    });

    const addTouch = (id, actionDown, actionUp) => {
        const btn = document.getElementById(id);
        btn.addEventListener('touchstart', (e) => { e.preventDefault(); actionDown(); }, {passive: false});
        btn.addEventListener('touchend', (e) => { e.preventDefault(); if(actionUp) actionUp(); }, {passive: false});
    };
    addTouch('btnLeft', () => keys.left = true, () => keys.left = false);
    addTouch('btnRight', () => keys.right = true, () => keys.right = false);
    addTouch('btnJump', () => { if(gameState.startsWith('EVENT')) advanceEvent(); else jump(); });
    addTouch('btnAttack', () => { if(gameState.startsWith('EVENT')) advanceEvent(); else attack(); });

    function jump() {
        if (player.isGrounded && gameState.startsWith('PLAYING')) {
            player.vy = player.jumpPower; player.isGrounded = false;
            createParticles(player.x + player.width/2, player.y + player.height, '#ccc', 5); sfx.jump();
        }
    }

    function attack() {
        if (!gameState.startsWith('PLAYING') && gameState !== 'BOSS_FIGHT') return;
        player.isAttacking = true;
        player.attackTimer = 15; 
        let hitBox = { x: player.x + (keys.left ? -player.attackRange : player.width), y: player.y - 20, w: player.attackRange, h: player.height + 40 };
        
        if (gameState.startsWith('PLAYING')) {
            mushrooms.forEach(m => {
                if (m.active && checkCollision(hitBox, m)) {
                    m.hp -= player.damage;
                    m.hitTimer = 8;
                    screenShake = 5;
                    addFloatingText(m.x, m.y, `-${player.damage}`, '#FFF');
                    if (m.hp <= 0) {
                        m.active = false; sfx.break();
                        createParticles(m.x + m.w/2, m.y + m.h/2, '#FF5722', 30);
                        addFloatingText(m.x, m.y-30, "破壞!", '#FFEB3B');
                    } else { sfx.hit(); createParticles(m.x + m.w/2, m.y + m.h/2, '#FFF', 10); }
                }
            });
        } else if (gameState === 'BOSS_FIGHT') {
            boss.hp -= player.damage;
            boss.hitTimer = 8;
            screenShake = 15; 
            sfx.hit();
            createParticles(boss.x + Math.random()*boss.width, boss.y + boss.height, '#FFF', 15);
            addFloatingText(boss.x + Math.random()*200, boss.y + boss.height - 50 + Math.random()*50, `💥 -${player.damage}000`, '#FF0000');
            bossHealthBar.style.width = (boss.hp / boss.maxHp * 100) + '%';
            if (boss.hp <= 0) {
                sfx.break();
                gameState = 'WIN_SEQ';
                boss.active = false;
                bossHealthContainer.classList.add('hidden');
                
                // 隱藏手機操作版以展示完整畫面
                if(document.getElementById('mobileControls')) document.getElementById('mobileControls').style.display = 'none';
                
                createParticles(boss.x + boss.width/2, boss.y + boss.height/2, '#FFD700', 100);
                setTimeout(winGame, 1500);
            }
        }
    }

    let eventStep = 0;
    function triggerEvent(id) {
        keys.left = false; keys.right = false; player.vx = 0;
        eventStep = 0;
        
        if (id === 'trigger_megaphone') {
            sfx.powerup();
            showMegaphoneEffect = true; 
            showDialog('系統提示', '拾獲大聲公！\n皮友幫打菇+3 !!');
            
            player.damage = 3; 
            player.attackRange = 150;
            
            gameState = 'EVENT_MEGAPHONE';
            setTimeout(() => {
                showMegaphoneEffect = false;
                hideDialog();
                gameState = 'PLAYING';
            }, 2000);

        } else if (id === 'trigger_ruth') {
            gameState = 'EVENT_RUTH';
            showDialog('GEG祖媽 Ruth', '來來來！祖媽幫妳加持！\n準備好 Party Walk 了嗎？😎');
            sfx.powerup();

        } else if (id === 'trigger_error') {
            gameState = 'EVENT_ERROR';
            sfx.error();
            playBGM('stop'); 
            glitchOverlay.classList.add('glitching');
            screenShake = 20;
            setTimeout(() => { advanceEvent(); }, 1500);

        } else if (id === 'trigger_boss') {
            gameState = 'EVENT_BOSS';
            boss.active = true;
            boss.state = 'dropping';
            playBGM('boss'); 
            sfx.error();
            let oldKey = player.currentKey;
            player.currentKey = 'roll_eyes';
            setTimeout(() => { player.currentKey = oldKey; }, 2000);
        }
    }

    function advanceEvent() {
        if (gameState === 'EVENT_RUTH') {
            if (eventStep === 0) {
                hideDialog();
                player.hasPartyWalk = true; player.speed = 10; player.damage = 3;
                player.currentKey = 'party_walk'; 
                addFloatingText(player.x, player.y - 50, "⭐ Party Walk 模式啟動!", '#FFEB3B');
                sfx.powerup();
                playBGM('party'); 
                gameState = 'PLAYING_BUFF';
            }
        } else if (gameState === 'EVENT_ERROR') {
            glitchOverlay.classList.remove('glitching');
            screenShake = 0;
            npcs.find(n => n.id === 'cylin').active = true;
            gameState = 'EVENT_CYLIN_DROP';
        } else if (gameState === 'EVENT_CYLIN_TALK') {
            if (eventStep === 0) {
                showDialog('仙子 CY Lin', '哎呀！剛才系統出了一點小錯誤。\n作為補償，送妳 5 張打菇券！🍄🎫');
                eventStep++;
            } else if (eventStep === 1) {
                showDialog('仙子 CY Lin', '再加上「種花數量 Double」！🌸\n還有，去吧！神獸歐慶！🐶');
                eventStep++;
            } else if (eventStep === 2) {
                hideDialog();
                player.currentKey = 'dog'; 
                player.hasPikmorphie = true;
                player.width = 180; player.height = 180; 
                player.y -= 60;
                player.speed = 12; player.jumpPower = -22; player.damage = 5; player.attackRange = 150;
                addFloatingText(player.x, player.y - 50, "⚔️ 戰力 +5000 !!", '#FF0000');
                createParticles(player.x + 90, player.y + 90, '#FFD700', 50);
                sfx.powerup();
                playBGM('party');
                gameState = 'PLAYING_GOD';
            }
        }
    }

    function showDialog(name, text) { dialogName.innerText = name; dialogText.innerText = text; dialogBox.style.display = 'block'; }
    function hideDialog() { dialogBox.style.display = 'none'; }
    function checkCollision(r1, r2) { return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y; }
    function createParticles(x, y, color, count) {
        for(let i=0; i<count; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15 - 5, life: 30 + Math.random() * 30, color: color, size: Math.random() * 8 + 4 }); }
    }
    function addFloatingText(x, y, text, color) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 60, vy: -2 }); }
    
    function winGame() {
        gameState = 'WIN';
        sfx.win(); 
        endScreen.classList.remove('hidden');
        setInterval(() => createParticles(Math.random()*canvas.width + cameraX, -20, ['#FF0','#F0F','#0FF','#0F0','#FFF'][Math.floor(Math.random()*5)], 3), 50);
    }

    function update() {
        if (gameState === 'START' || gameState === 'WIN') return;
        if (screenShake > 0) screenShake--;
        
        if (gameState.startsWith('PLAYING') || gameState === 'BOSS_FIGHT') {
            if (keys.right) player.vx = player.speed;
            else if (keys.left) player.vx = -player.speed;
            else player.vx = 0;
            
            if (player.hasPartyWalk && Math.abs(player.vx) > 0 && Math.random() > 0.5) {
                createParticles(player.x + player.width/2, player.y + player.height - 20, ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF'][Math.floor(Math.random()*5)], 1);
            }
        }

        let nextX = player.x + player.vx;
        let blocked = false;
        let pBox = { x: nextX + 20, y: player.y + 10, w: player.width - 40, h: player.height - 10 };

        if (gameState.startsWith('PLAYING')) {
            mushrooms.forEach(m => {
                if (m.active && checkCollision(pBox, {x: m.x, y: m.y, w: m.w, h: m.h})) {
                    if ((player.hasPartyWalk || player.hasPikmorphie) && m.hp === 1) {
                        m.hp = 0; m.active = false; sfx.break();
                        createParticles(m.x+30, m.y+30, '#FF5722', 20);
                        addFloatingText(m.x, m.y, "撞碎!", '#FFF');
                    } else blocked = true; 
                }
            });
        }
        
        if (gameState === 'BOSS_FIGHT' && boss && boss.active) {
            if (nextX + player.width > boss.x + 50) {
                blocked = true;
                nextX = boss.x + 50 - player.width; 
            }
        }

        if (!blocked) player.x = nextX;
        
        if (player.x > cameraX + canvas.width * 0.4) cameraX = player.x - canvas.width * 0.4;
        if (player.x < cameraX) player.x = cameraX; 

        player.vy += player.gravity; player.y += player.vy;
        if (player.y + player.height > groundY) { player.y = groundY - player.height; player.vy = 0; player.isGrounded = true; }
        if (player.attackTimer > 0) player.attackTimer--; else player.isAttacking = false;
        
        eventTriggers.forEach(t => { if (!t.done && player.x > t.x) { t.done = true; triggerEvent(t.id); } });
        
        if (gameState === 'EVENT_CYLIN_DROP') {
            let cylin = npcs.find(n => n.id === 'cylin');
            cylin.y += 10;
            if (cylin.y >= cylin.targetY) {
                cylin.y = cylin.targetY;
                screenShake = 10; sfx.hit();
                gameState = 'EVENT_CYLIN_TALK';
                eventStep = 0; advanceEvent(); 
            }
        }
        
        if (gameState === 'EVENT_BOSS' && boss.state === 'dropping') {
            boss.y += 25; 
            if (boss.y >= boss.targetY) {
                boss.y = boss.targetY;
                screenShake = 40; sfx.break(); 
                createParticles(boss.x + boss.width/2, boss.y + boss.height, '#654321', 80); 
                boss.state = 'active';
                gameState = 'BOSS_FIGHT';
                bossHealthContainer.classList.remove('hidden');
                bossHealthBar.style.width = '100%';
            }
        }

        particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.vy += 0.5; p.life--; if(p.life <= 0) particles.splice(i, 1); });
        floatingTexts.forEach((t, i) => { t.y += t.vy; t.life--; if(t.life <= 0) floatingTexts.splice(i, 1); });
    }

    function draw() {
        ctx.fillStyle = '#87CEEB'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(-cameraX + (Math.random()*screenShake - screenShake/2), (Math.random()*screenShake - screenShake/2));
        
        ctx.fillStyle = '#B0E0E6'; 
        for(let i=0; i<10; i++) { ctx.beginPath(); ctx.moveTo(i*800 + cameraX*0.8, groundY); ctx.lineTo(i*800 + 400 + cameraX*0.8, groundY - 300); ctx.lineTo(i*800 + 800 + cameraX*0.8, groundY); ctx.fill(); }
        ctx.fillStyle = '#90EE90'; 
        for(let i=0; i<15; i++) { ctx.beginPath(); ctx.moveTo(i*500 + cameraX*0.5, groundY); ctx.lineTo(i*500 + 250 + cameraX*0.5, groundY - 200); ctx.lineTo(i*500 + 500 + cameraX*0.5, groundY); ctx.fill(); }
        
        ctx.fillStyle = '#8B4513'; ctx.fillRect(cameraX-100, groundY, canvas.width + 200, canvas.height - groundY);
        ctx.fillStyle = '#4CAF50'; ctx.fillRect(cameraX-100, groundY, canvas.width + 200, 20);
        
        // 修正雲朵高度適應縮放
        ctx.font = '40px Arial';
        ctx.fillText('☁️', cameraX*0.9 + 100, canvas.height * 0.2); 
        ctx.fillText('☁️', cameraX*0.9 + 500, canvas.height * 0.15);
        
        if (player.hasPikmorphie) {
            for(let i=0; i<10; i++) { ctx.fillText('🌸', cameraX + i*200, groundY - 10); ctx.fillText('🌻', cameraX + i*200 + 100, groundY - 10); }
        }

        npcs.forEach(n => {
            if (n.active) {
                drawSprite(n.key, n.x, n.y, n.w, n.h, false, n.emoji);
                let bob = Math.sin(Date.now() / 200) * 5;
                ctx.font = 'bold 24px 微軟正黑體'; ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillText(n.name, n.x, n.y - 15 + bob);
            }
        });

        mushrooms.forEach(m => {
            if (m.active) {
                let ox = m.hitTimer > 0 ? (Math.random()*10-5) : 0;
                let oy = m.hitTimer > 0 ? (Math.random()*10-5) : 0;
                drawSprite('mushroom_enemy', m.x + ox, m.y + oy, m.w, m.h, false, '🍄');
            }
        });

        if (boss && boss.active) {
            let bx = boss.x + (boss.hitTimer > 0 ? (Math.random()*16-8) : 0);
            let by = boss.y + (boss.hitTimer > 0 ? (Math.random()*16-8) : 0);
            
            drawSprite('big_ben', bx, by, boss.width, boss.height, false, '🧔🏻‍♂️');
            
            ctx.fillStyle = '#E91E63'; ctx.font = '900 60px Arial';
            ctx.fillText('NOT THIS', bx + 60, by + boss.height - 80);
            ctx.fillText('WAY!', bx + 130, by + boss.height - 20);
        }

        let isFlip = keys.left && !keys.right;
        drawSprite(player.currentKey, player.x, player.y, player.width, player.height, isFlip, player.emoji);

        if (showMegaphoneEffect) {
            drawSprite('megaphone', player.x + player.width/2 - 50, player.y - 100, 100, 100, false, '📢');
        }

        if (player.isAttacking) {
            ctx.save();
            let atkX = keys.left ? player.x - player.attackRange : player.x + player.width;
            if (player.hasPikmorphie) {
                ctx.fillStyle = 'rgba(255, 0, 0, 0.6)'; ctx.beginPath(); ctx.arc(atkX + 40, player.y + 80, 80 + Math.random()*20, 0, Math.PI*2); ctx.fill();
                ctx.font = '80px Arial'; ctx.fillText('💥', atkX, player.y + 100);
            } else {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)'; ctx.beginPath(); ctx.arc(atkX + 20, player.y + 60, 50, 0, Math.PI*2); ctx.fill();
                ctx.font = '50px Arial'; ctx.fillText('💨', atkX, player.y + 70);
            }
            ctx.restore();
        }

        particles.forEach(p => { ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size); });
        floatingTexts.forEach(t => {
            ctx.fillStyle = t.color; ctx.font = 'bold 35px 微軟正黑體';
            ctx.strokeStyle = '#000'; ctx.lineWidth = 6;
            ctx.strokeText(t.text, t.x, t.y); ctx.fillText(t.text, t.x, t.y);
        });
        ctx.restore();
    }

    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx = bgCanvas.getContext('2d');
    let bgParticles = [];
    function initBgParticles() {
        if (!bgCanvas) return;
        bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
        bgParticles = [];
        for(let i=0; i<50; i++) {
            bgParticles.push({
                x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
                vy: 1 + Math.random() * 2, size: 5 + Math.random() * 10,
                color: ['#FFCDD2', '#F8BBD0', '#FFFFFF'][Math.floor(Math.random()*3)]
            });
        }
    }
    
    // 背景尺寸跟隨主視窗更新
    window.addEventListener('resize', initBgParticles);

    function drawBgParticles() {
        if (gameState !== 'START') return; 
        bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
        bgParticles.forEach(p => {
            bgCtx.fillStyle = p.color; bgCtx.globalAlpha = 0.6;
            bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.size, 0, Math.PI*2); bgCtx.fill();
            p.y += p.vy;
            if (p.y > bgCanvas.height) { p.y = -20; p.x = Math.random() * bgCanvas.width; }
        });
        requestAnimationFrame(drawBgParticles);
    }
    initBgParticles();
    drawBgParticles();

    function gameLoop() { update(); draw(); if (gameState !== 'START') requestAnimationFrame(gameLoop); }
    draw();
</script>
</body>
</html>
